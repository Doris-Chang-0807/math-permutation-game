<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可愛數學排列 - 全關卡</title>
    <style>
        :root {
            --primary: #ffb6c1; --secondary: #ffd700; --accent: #87cefa;
            --bg: #fffaf0; --text: #5d4037; --success: #4caf50;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
        }

        .game-container {
            max-width: 850px; margin: 0 auto; background: white; padding: 30px;
            border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }

        /* 隱藏不活躍的關卡 */
        .level { display: none; }
        .level.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #ff69b4; margin-bottom: 10px; }
        .instructions { background: #fff9c4; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px dashed #fbc02d; line-height: 1.6; }

        .game-area { display: flex; justify-content: space-around; gap: 20px; margin-bottom: 20px; }
        .bank, .plate { width: 45%; min-height: 400px; border: 4px dashed var(--accent); border-radius: 20px; padding: 15px; background: #fff; }

        .ingredient {
            width: 130px; height: 50px; margin: 8px auto; border-radius: 25px; cursor: grab;
            display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2); transition: 0.2s;
        }

        .fixed { cursor: not-allowed; opacity: 0.7; border: 3px solid #ff69b4; box-shadow: none; }
        .color-bun { background: #f4a460; color: #5d4037; }
        .color-beef { background: #8b4513; }
        .color-cheese { background: #ffd700; color: #5d4037; }
        .color-lettuce { background: #32cd32; }
        .color-tomato { background: #ff4500; }

        /* 驗證區樣式 */
        .quiz-section {
            background: #e1f5fe; padding: 20px; border-radius: 20px; margin-top: 20px;
            border: 3px solid var(--accent);
        }

        input[type="number"] {
            padding: 10px; font-size: 1.2rem; width: 80px; border-radius: 10px;
            border: 2px solid var(--accent); text-align: center;
        }

        .btn {
            padding: 10px 25px; font-size: 1.1rem; border-radius: 50px; border: none;
            cursor: pointer; transition: 0.3s; margin-left: 10px;
        }
        .btn-check { background: var(--secondary); color: #5d4037; box-shadow: 0 4px 0 #fbc02d; }
        .btn-next { background: var(--success); color: white; box-shadow: 0 4px 0 #388e3c; display: none; }
        
        .success-msg { color: var(--success); font-weight: bold; margin-top: 10px; display: none; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="level2" class="level active">
        <h1>🍔 第 2 關：專業廚師的堅持 🍟</h1>
        <div class="instructions">
            老闆命令：<span style="color:red">上層與下層麵包的位置固定了！</span><br>
            請拖曳剩下的 4 種食材到中間。完成後，請計算總共有幾種排法？
        </div>

        <div class="game-area">
            <div class="bank" id="bank2">
                <div class="ingredient color-beef" draggable="true" id="l2-beef">厚切牛肉</div>
                <div class="ingredient color-cheese" draggable="true" id="true" id="l2-cheese">起司片</div>
                <div class="ingredient color-lettuce" draggable="true" id="l2-lettuce">爽脆生菜</div>
                <div class="ingredient color-tomato" draggable="true" id="l2-tomato">番茄片</div>
            </div>
            <div class="plate" id="plate2" style="display:flex; flex-direction:column-reverse; align-items:center;">
                <div class="ingredient color-bun fixed">下層麵包 (固定)</div>
                <div id="drop-zone-2" style="width:100%; min-height:220px; display:flex; flex-direction:column-reverse; align-items:center;"></div>
                <div class="ingredient color-bun fixed">上層麵包 (固定)</div>
            </div>
        </div>

        <div class="quiz-section">
            <p>🤔 算算看，中間 4 層食材的排列總數是多少？</p>
            <input type="number" id="ans2" placeholder="?">
            <button class="btn btn-check" onclick="checkAnswer(2, 24)">檢查答案</button>
            <div id="msg2" class="success-msg">🎉 太厲害了！(6-2)! = 4! = 24 正確！</div>
            <button id="next2" class="btn btn-next" onclick="goToLevel(3)">前進第 3 關：鬼屋探險 👻</button>
        </div>
    </div>

    <div id="level3" class="level">
        <h1>👻 第 3 關：鬼屋大探險 👻</h1>
        <div class="instructions">
            (開發中) 大膽王要站最前面，膽小鬼要站中間... 你能算出幾種排法嗎？
        </div>
        <button class="btn btn-check" onclick="location.reload()">回首頁重新玩</button>
    </div>
</div>

<script>
    // 拖曳邏輯
    const dropZone2 = document.getElementById('drop-zone-2');
    
    document.querySelectorAll('.ingredient[draggable="true"]').forEach(ing => {
        ing.addEventListener('dragstart', (e) => e.dataTransfer.setData('text', e.target.id));
    });

    dropZone2.addEventListener('dragover', (e) => e.preventDefault());
    dropZone2.addEventListener('drop', (e) => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text');
        const el = document.getElementById(id);
        if (el) {
            dropZone2.appendChild(el);
            el.draggable = false;
        }
    });

    // 檢查答案邏輯
    function checkAnswer(levelNum, correctAnswer) {
        const userAns = document.getElementById('ans' + levelNum).value;
        const msg = document.getElementById('msg' + levelNum);
        const nextBtn = document.getElementById('next' + levelNum);

        if (parseInt(userAns) === correctAnswer) {
            msg.style.display = 'block';
            nextBtn.style.display = 'inline-block';
            // 簡單的灑花效果可以加在這裡
            document.getElementById('ans' + levelNum).style.borderColor = '#4caf50';
        } else {
            alert("再想一下喔！是不是哪個數字乘錯了？");
            document.getElementById('ans' + levelNum).style.borderColor = 'red';
        }
    }

    // 切換關卡邏輯
    function goToLevel(num) {
        document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
        document.getElementById('level' + num).classList.add('active');
    }
</script>

</body>
</html>
