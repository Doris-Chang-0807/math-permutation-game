<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAZY WCDONALD - 排列單元教學</title>
    <style>
        :root { --primary: #e61e2a; --secondary: #ffbc0d; --bg: #f8f9fa; }
        body { font-family: "Arial", sans-serif; background-color: var(--bg); margin: 0; overflow: hidden; }
        
        /* 頁面切換機制 */
        .page { display: none; height: 100vh; width: 100vw; position: relative; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* 左上角計時器 */
        #timer-display { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: var(--primary); z-index: 100; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        /* 食材與盤子樣式 */
        .ingredient { width: 120px; height: 30px; margin: 5px; cursor: grab; text-align: center; line-height: 30px; border-radius: 15px; font-weight: bold; color: white; transition: transform 0.2s; }
        .bun-top { background: #d2691e; border-radius: 50px 50px 10px 10px; height: 40px; }
        .bun-bottom { background: #d2691e; border-radius: 10px 10px 50px 50px; }
        .patty { background: #8b4513; height: 25px; }
        .lettuce { background: #32cd32; }
        .cheese { background: #ffd700; color: #333; }
        .tomato { background: #ff6347; }
        .bacon { background: #b22222; }

        .plate { width: 300px; min-height: 200px; border-bottom: 10px solid #ccc; margin-top: 50px; display: flex; flex-direction: column-reverse; align-items: center; padding-bottom: 10px; }

        /* 按鈕樣式 */
        button { background: var(--secondary); border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 20px; }
        button:hover { transform: scale(1.1); background: #f0ad00; }

        /* 動畫效果 */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .floating { animation: float 3s ease-in-out infinite; }
        
        .money-rain { position: absolute; top: -50px; font-size: 24px; animation: fall 3s linear infinite; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="timer-display" style="display:none;">剩餘時間: <span id="time-left">07:00</span></div>

    <div id="page0" class="page active">
        <h1 style="color: var(--primary); font-size: 60px; margin-bottom: 10px;">CRAZY WCDONALD</h1>
        <p>歡迎來到瘋狂麥當勞！準備好迎接排列挑戰了嗎？</p>
        <img src="https://img.icons8.com/color/160/chef.png" class="floating" alt="Chef">
        <button onclick="nextPage(1)">開始遊戲</button>
    </div>

    <div id="page1" class="page">
        <h2>第一關：見習廚師 (暖身練習)</h2>
        <p>客人點餐：生菜、牛肉、上層麵包、下層麵包</p>
        <div id="source-ingredients" style="display:flex;">
            <div class="ingredient lettuce" draggable="true" ondragstart="drag(event)" id="let1">生菜</div>
            <div class="ingredient patty" draggable="true" ondragstart="drag(event)" id="pat1">牛肉</div>
            <div class="ingredient bun-top" draggable="true" ondragstart="drag(event)" id="bt1">上層麵包</div>
            <div class="ingredient bun-bottom" draggable="true" ondragstart="drag(event)" id="bb1">下層麵包</div>
        </div>
        <div class="plate" ondrop="drop(event)" ondragover="allowDrop(event)" id="plate1"></div>
        <p id="hint">☝️ 提示：拖曳食材到盤子裡完成漢堡！</p>
        <button id="next-btn-1" style="display:none;" onclick="startOfficialGame()">下一個訂單</button>
    </div>

    <div id="game-page" class="page">
        <h2 id="level-title">正式廚師</h2>
        <div id="order-box" style="background: white; padding: 15px; border-left: 5px solid var(--primary); margin: 10px;">
            <strong>📋 今日訂單：</strong> <span id="order-desc"></span>
        </div>
        <div id="money-counter">累積工資: $<span id="total-money">0</span></div>
        <div id="game-ingredients" style="display:flex; margin: 20px;"></div>
        <div class="plate" ondrop="drop(event)" ondragover="allowDrop(event)" id="main-plate"></div>
        
        <div id="math-question" style="display:none; text-align: center; margin-top: 20px; background: #eee; padding: 15px; border-radius: 10px;">
            <p id="question-text">客人提問：這些食材可以製作出幾種漢堡？</p>
            <div id="options"></div>
        </div>
        
        <button id="serve-btn" onclick="checkOrder()">出餐！</button>
    </div>

    <div id="page9" class="page">
        <h1 style="color: var(--secondary);">💰 薪資結算 💰</h1>
        <div id="final-amount" style="font-size: 48px; font-weight: bold; margin: 20px;">$0</div>
        <img src="https://img.icons8.com/color/160/happy-chef.png" alt="Happy Chef">
        <p>幹得好！你是一個優秀的數學大廚！</p>
        <div id="rain-container"></div>
    </div>

    <script>
        let currentPage = 0;
        let totalMoney = 0;
        let timeLeft = 420; // 7 分鐘 = 420 秒 [cite: 7]
        let timerInterval;

        // 關卡資料 [cite: 16-43]
        const levels = [
            null, // Page 0
            null, // Page 1 (Hardcoded)
            { id: 2, title: "正式廚師", order: "上層麵包、下層麵包、培根", items: ["bun-top", "bun-bottom", "bacon"], answer: "3!", price: 100 },
            { id: 3, title: "正式廚師", order: "上層麵包、下層麵包、生菜、起司、番茄、牛肉", items: ["bun-top", "bun-bottom", "lettuce", "cheese", "tomato", "patty"], answer: "6!", price: 200 },
            { id: 4, title: "正式廚師", order: "下層麵包、生菜、起司、番茄 (生菜必須在最下面)", items: ["bun-bottom", "lettuce", "cheese", "tomato"], answer: "3!", price: 150 },
            { id: 5, title: "主廚臨檢", order: "上層麵包、下層麵包、培根、起司、牛肉 (上層最上，下層最下)", items: ["bun-top", "bun-bottom", "bacon", "cheese", "patty"], answer: "3!", price: 250 },
            { id: 6, title: "正式廚師", order: "起司、番茄、牛肉 (不要麵包)", items: ["cheese", "tomato", "patty"], answer: "3!", price: 120 },
            { id: 7, title: "正式廚師", order: "生菜、番茄、培根、上麵包、下麵包 (培根最上，上麵包最下)", items: ["lettuce", "tomato", "bacon", "bun-top", "bun-bottom"], answer: "3!", price: 300 },
            { id: 8, title: "終極挑戰", order: "選六種食材自由發揮！", items: ["bun-top", "bun-bottom", "patty", "lettuce", "cheese", "tomato", "bacon"], isFinal: true, price: 500 }
        ];

        function nextPage(pageIdx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            if (pageIdx <= 8) {
                const pageId = pageIdx === 1 ? 'page1' : 'game-page';
                document.getElementById(pageId).classList.add('active');
                if (pageIdx >= 2) loadLevel(pageIdx);
            } else {
                showFinalPage();
            }
            currentPage = pageIdx;
        }

        function startOfficialGame() {
            document.getElementById('timer-display').style.display = 'block';
            startTimer();
            nextPage(2);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('time-left').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showFinalPage(); // 時間到跳轉 [cite: 8]
                }
            }, 1000);
        }

        function loadLevel(idx) {
            const lv = levels[idx];
            document.getElementById('level-title').innerText = lv.title;
            document.getElementById('order-desc').innerText = lv.order;
            document.getElementById('main-plate').innerHTML = "";
            document.getElementById('math-question').style.display = "none";
            document.getElementById('serve-btn').style.display = "block";
            
            const ingredientArea = document.getElementById('game-ingredients');
            ingredientArea.innerHTML = "";
            lv.items.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `ingredient ${item}`;
                div.draggable = true;
                div.id = `item-${idx}-${i}`;
                div.innerText = getItemName(item);
                div.ondragstart = drag;
                ingredientArea.appendChild(div);
            });
        }

        function getItemName(type) {
            const names = { "bun-top": "上層麵包", "bun-bottom": "下層麵包", "patty": "牛肉", "lettuce": "生菜", "cheese": "起司", "tomato": "番茄", "bacon": "培根" };
            return names[type] || type;
        }

        // 拖放邏輯 [cite: 14]
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedEl = document.getElementById(data);
            ev.currentTarget.appendChild(draggedEl);
            if (currentPage === 1) document.getElementById('next-btn-1').style.display = "block";
        }

        function checkOrder() {
            document.getElementById('serve-btn').style.display = "none";
            document.getElementById('math-question').style.display = "block";
            const lv = levels[currentPage];
            const optionsArea = document.getElementById('options');
            optionsArea.innerHTML = "";

            if (lv.isFinal) { // 第八頁特殊設計 [cite: 42, 43]
                for(let i=0; i<6; i++) {
                    let select = document.createElement('input');
                    select.type = "number"; select.min=1; select.max=7; select.value=1;
                    select.style.width="40px";
                    optionsArea.appendChild(select);
                }
            } else {
                ["2!", "3!", "4!", "5!", "6!", "7!"].forEach(opt => {
                    const btn = document.createElement('button');
                    btn.innerText = opt;
                    btn.style.margin = "5px";
                    btn.onclick = () => submitAnswer(opt === lv.answer);
                    optionsArea.appendChild(btn);
                });
            }
            if(lv.isFinal) {
                const submit = document.createElement('button');
                submit.innerText = "提交答案";
                submit.onclick = () => submitAnswer(true);
                optionsArea.appendChild(submit);
            }
        }

        function submitAnswer(isCorrect) {
            const lv = levels[currentPage];
            if (isCorrect) {
                alert("太棒了！獲得小費！");
                totalMoney += (lv.price + 50); [cite: 5]
            } else {
                alert("喔不，客人失望地離開了。正確答案是 " + lv.answer);
                totalMoney += lv.price;
            }
            document.getElementById('total-money').innerText = totalMoney;
            
            if (currentPage < 8) nextPage(currentPage + 1);
            else showFinalPage();
        }

        function showFinalPage() {
            clearInterval(timerInterval);
            document.getElementById('timer-display').style.display = 'none';
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page9').classList.add('active');
            document.getElementById('final-amount').innerText = `$ ${totalMoney}`; [cite: 8]
            createMoneyRain();
        }

        function createMoneyRain() {
            const container = document.getElementById('rain-container');
            for(let i=0; i<50; i++) {
                const m = document.createElement('div');
                m.className = 'money-rain';
                m.innerText = '💰';
                m.style.left = Math.random() * 100 + 'vw';
                m.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(m);
            }
        }
    </script>
</body>
</html>
