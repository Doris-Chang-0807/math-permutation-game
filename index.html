<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數學排列大冒險 - 榮耀成就版</title>
    <style>
        :root { --primary: #ffb6c1; --secondary: #ffd700; --accent: #87cefa; --bg: #fffaf0; --text: #5d4037; --success: #4caf50; --rock: #6d4c41;}
        body { font-family: '微軟正黑體', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        .game-container { max-width: 900px; margin: 10px auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; min-height: 700px;}
        
        .level { display: none; }
        .level.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h1 { color: #ff69b4; text-align: center; margin-bottom: 5px; font-size: 2rem; }
        .instructions { background: #fff9c4; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 2px dashed #fbc02d; line-height: 1.6; }

        .game-area { display: flex; justify-content: space-around; gap: 20px; margin-bottom: 20px; }
        .bank, .drop-zone { 
            width: 45%; min-height: 400px; border: 4px dashed var(--accent); border-radius: 20px; 
            padding: 15px; background: #fff; display: flex; flex-wrap: wrap; align-content: flex-start; justify-content: center; gap: 8px;
        }

        #zone1 { flex-direction: column; align-items: center; justify-content: flex-start; flex-wrap: nowrap; }
        #zone1 .item { width: 90%; margin: 2px 0; }

        .cliff-bg { 
            background: radial-gradient(circle at 20% 20%, #fff 10%, transparent 12%), linear-gradient(to bottom, #87ceeb 0%, #fff 100%), linear-gradient(135deg, var(--rock) 25%, #5d4037 25%);
            background-size: 100% 100%, 100% 100%, 40px 40px; position: relative; border: 6px solid var(--rock);
        }

        .item { width: 130px; height: 40px; border-radius: 12px; cursor: grab; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); font-size: 0.9rem; z-index: 10; }
        .fixed { cursor: not-allowed; opacity: 0.8; box-shadow: none; border: 2px solid #999; }
        
        .c-bun { background: #f4a460; color: #5d4037; } .c-meat { background: #8b4513; } .c-veg { background: #32cd32; }
        .c-cheese { background: #ffd700; color: #5d4037; } .c-tomato { background: #ff4500; } .c-bacon { background: #ff69b4; }
        .c-person { background: #9575cd; border-radius: 20px; } .c-boy { background: #42a5f5; border-radius: 20px; } .c-girl { background: #ec407a; border-radius: 20px; }

        .quiz-section { background: #e1f5fe; padding: 20px; border-radius: 20px; text-align: center; border: 3px solid var(--accent); }
        .explanation { display: none; background: #e8f5e9; padding: 10px; border-radius: 10px; margin-top: 10px; color: #2e7d32; font-weight: bold; }
        
        select { padding: 8px; font-size: 1.1rem; border-radius: 10px; border: 2px solid var(--accent); margin: 5px; }
        .btn { padding: 10px 25px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; margin: 8px; transition: 0.2s; }
        .btn-check { background: var(--secondary); color: var(--text); box-shadow: 0 4px 0 #fbc02d; }
        .btn-next { background: var(--success); color: white; display: none; }
        .btn-result { background: #ff69b4; color: white; display: none; font-size: 1.2rem; }

        /* 紙花動畫 */
        .confetti { position: fixed; width: 10px; height: 10px; background-color: #f00; z-index: 1000; top: -10px; animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        #end-screen { text-align: center; display: none; animation: scaleIn 0.5s; }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .score-box { background: #fff3e0; padding: 20px; border-radius: 20px; margin: 20px 0; border: 2px solid #ffb74d; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="progress-text" style="text-align:right; font-weight:bold; color:var(--accent);">LEVEL 1 / 5</div>

    <div id="level1" class="level active">
        <h1>🍔 第一關：豪華七層漢堡</h1>
        <div class="instructions">請拖曳所有食材！<b>7</b> 個相異物件全排列的邏輯是什麼？</div>
        <div class="game-area"><div class="bank" id="bank1"></div><div class="drop-zone" id="zone1"></div></div>
        <div class="quiz-section">
            <select id="ans1"><option value="">選階層</option><option value="6">6!</option><option value="7">7!</option></select>
            <button class="btn btn-check" onclick="processCheck(1, '7', '因為有 7 個相異物件，所以是 7!')">檢查邏輯</button>
            <div id="exp1" class="explanation"></div>
            <button id="next1" class="btn btn-next" onclick="go(2)">下一關 ➔</button>
        </div>
    </div>

    <div id="level2" class="level">
        <h1>🍞 第二關：主廚的堅持</h1>
        <div class="instructions">上下麵包已固定。中間還有 <b>4</b> 個空位，排列數是多少？</div>
        <div class="game-area"><div class="bank" id="bank2"></div><div class="drop-zone" id="zone2"></div></div>
        <div class="quiz-section">
            <select id="ans2"><option value="">?</option><option value="4">4!</option><option value="6">6!</option></select>
            <button class="btn btn-check" onclick="processCheck(2, '4', '頭尾固定後，僅中間 4 個相異食材在排列，所以是 4!')">檢查邏輯</button>
            <div id="exp2" class="explanation"></div>
            <button id="next2" class="btn btn-next" onclick="go(3)">下一關 ➔</button>
        </div>
    </div>

    <div id="level3" class="level">
        <h1>👻 第三關：鬼屋探險</h1>
        <div class="instructions">5人中，2人位置已死（第1與第3）。剩下 <b>3</b> 人怎麼排？</div>
        <div class="game-area"><div class="bank" id="bank3"></div><div class="drop-zone" id="zone3"></div></div>
        <div class="quiz-section">
            <select id="ans3"><option value="">?</option><option value="3">3!</option><option value="5">5!</option></select>
            <button class="btn btn-check" onclick="processCheck(3, '3', '剩下的 3 個空位給 3 人排，就是 3!')">檢查邏輯</button>
            <div id="exp3" class="explanation"></div>
            <button id="next3" class="btn btn-next" onclick="go(4)">下一關 ➔</button>
        </div>
    </div>

    <div id="level4" class="level">
        <h1>🧗 第四關：懸崖疊羅漢</h1>
        <div class="instructions">2女在上，3男在下。分別排列女生與男生的位置。</div>
        <div class="game-area"><div class="bank" id="bank4"></div><div class="drop-zone cliff-bg" id="zone4"></div></div>
        <div class="quiz-section">
            (<select id="ans4-1"><option value="2">2!</option><option value="3">3!</option></select>) 
            <select id="ans4-op"><option value="x">×</option><option value="+">+</option></select>
            (<select id="ans4-2"><option value="2">2!</option><option value="3">3!</option></select>)
            <button class="btn btn-check" onclick="processCheck4()">檢查邏輯</button>
            <div id="exp4" class="explanation"></div>
            <button id="next4" class="btn btn-next" onclick="go(5)">最後一關！ ➔</button>
        </div>
    </div>

    <div id="level5" class="level">
        <h1>🏆 第五關：榮耀頒獎</h1>
        <div class="instructions">5人領獎，第1名固定站中間。其餘 <b>4</b> 位怎麼排？</div>
        <div class="quiz-section">
            <select id="ans5"><option value="">?</option><option value="4">4!</option><option value="5">5!</option></select>
            <button class="btn btn-check" onclick="processCheck(5, '4', '中間固定後，剩下 4 個位置由 4 人排列，為 4!')">檢查</button>
            <div id="exp5" class="explanation"></div>
            <button id="btn-result" class="btn btn-result" onclick="showFinalResult()">🌟 查看冒險結果</button>
        </div>
    </div>

    <div id="end-screen">
        <div class="trophy">🏆</div>
        <h1 id="identity-title">稱號加冕中...</h1>
        <div class="score-box">
            <h3 id="final-score-text"></h3>
            <p id="identity-desc"></p>
        </div>
        <button class="btn" style="background:#87cefa; color:white;" onclick="showAnalysis()">錯題分析 ✨</button>
        <button class="btn" style="background:var(--secondary);" onclick="location.reload()">再玩一次 🔄</button>
        <button class="btn" style="background:#ffb6c1;" onclick="alert('連結已複製！快分享給朋友一起挑戰吧！')">分享給朋友 🔗</button>
    </div>
</div>

<script>
    let firstTryCorrect = [false, false, false, false, false];
    let attempts = [0, 0, 0, 0, 0];

    // 初始化物件 (避免重複寫 HTML)
    function init() {
        const b1 = document.getElementById('bank1');
        const items1 = [
            ['l1-i1','c-bun','🍞 上層麵包'],['l1-i2','c-meat','🥩 牛肉'],['l1-i3','c-veg','🥬 生菜'],
            ['l1-i4','c-cheese','🧀 起司'],['l1-i5','c-tomato','🍅 番茄'],['l1-i6','c-bacon','🥓 培根'],['l1-i7','c-bun','🍞 下層麵包']
        ];
        items1.forEach(i => b1.innerHTML += `<div class="item ${i[1]}" draggable="true" id="${i[0]}">${i[2]}</div>`);
        
        // 其他關卡物件初始化 (略，同前版本...)
        document.getElementById('bank2').innerHTML = `<div class="item c-meat" draggable="true" id="l2-i1">🥩 牛肉</div><div class="item c-veg" draggable="true" id="l2-i2">🥬 生菜</div><div class="item c-cheese" draggable="true" id="l2-i3">🧀 起司</div><div class="item c-tomato" draggable="true" id="l2-i4">🍅 番茄</div>`;
        document.getElementById('zone2').innerHTML = `<div class="item c-bun fixed">🍞 上層 (固定)</div><div id="sub2" style="min-height:200px; width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; border:2px dashed #ccc;"></div><div class="item c-bun fixed">🍞 下層 (固定)</div>`;
        document.getElementById('bank3').innerHTML = `<div class="item c-person" draggable="true" id="l3-i1">🚶 隊員 A</div><div class="item c-person" draggable="true" id="l3-i2">🚶 隊員 B</div><div class="item c-person" draggable="true" id="l3-i3">🚶 隊員 C</div>`;
        document.getElementById('zone3').innerHTML = `<div class="item c-boy fixed">😎 大膽王 (1)</div><div id="sub3-1" style="height:45px; width:100%; border:2px dashed #ddd; display:flex; justify-content:center; align-items:center;"></div><div class="item c-girl fixed">😨 膽小鬼 (3)</div><div id="sub3-2" style="min-height:100px; width:100%; border:2px dashed #ddd; display:flex; flex-direction:column; align-items:center; justify-content:center;"></div>`;
        document.getElementById('bank4').innerHTML = `<div class="item c-girl" draggable="true" id="l4-i1">👩 女生 A</div><div class="item c-girl" draggable="true" id="l4-i2">👩 女生 B</div><div class="item c-boy" draggable="true" id="l4-i3">👨 男生 A</div><div class="item c-boy" draggable="true" id="l4-i4">👨 男生 B</div><div class="item c-boy" draggable="true" id="l4-i5">👨 男生 C</div>`;
        document.getElementById('zone4').innerHTML = `<div id="sub4-top" style="height:120px; width:100%; border:2px dashed pink; margin-bottom:20px; display:flex; flex-direction:column; align-items:center; justify-content:center;"></div><div id="sub4-bot" style="height:180px; width:100%; border:2px dashed #42a5f5; display:flex; flex-direction:column; align-items:center; justify-content:center;"></div>`;
    }

    init();

    // 拖曳邏輯
    document.addEventListener('dragstart', e => { if(e.target.classList.contains('item')) e.dataTransfer.setData('text', e.target.id); });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text');
        const el = document.getElementById(id);
        const target = e.target.closest('.drop-zone, .bank, #sub2, #sub3-1, #sub3-2, #sub4-top, #sub4-bot');
        if(target && el) target.appendChild(el);
    });

    function processCheck(lv, correct, text) {
        attempts[lv-1]++;
        const val = document.getElementById('ans' + lv).value;
        const exp = document.getElementById('exp' + lv);
        if(val === correct) {
            if(attempts[lv-1] === 1) firstTryCorrect[lv-1] = true;
            exp.innerHTML = "✨ 正確！" + text;
            exp.style.display = 'block';
            if(lv === 5) document.getElementById('btn-result').style.display = 'inline-block';
            else document.getElementById('next' + lv).style.display = 'inline-block';
        } else { alert("再想想看喔！"); }
    }

    function processCheck4() {
        attempts[3]++;
        const v1 = document.getElementById('ans4-1').value;
        const op = document.getElementById('ans4-op').value;
        const v2 = document.getElementById('ans4-2').value;
        if(op === 'x' && ((v1==='2' && v2==='3') || (v1==='3' && v2==='2'))) {
            if(attempts[3] === 1) firstTryCorrect[3] = true;
            document.getElementById('exp4').innerHTML = "✨ 正確！女生 2! 乘上 男生 3!，這是乘法原理。";
            document.getElementById('exp4').style.display = 'block';
            document.getElementById('next4').style.display = 'inline-block';
        } else { alert("邏輯不太對喔！"); }
    }

    function showFinalResult() {
        createConfetti();
        document.getElementById('level5').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('progress-text').innerText = "冒險完成！";

        const score = firstTryCorrect.filter(v => v).length;
        document.getElementById('final-score-text').innerText = `你的首選正確題數：${score} / 5`;
        
        const title = document.getElementById('identity-title');
        const desc = document.getElementById('identity-desc');

        if(score === 5) {
            title.innerText = "✨ 數學時空大師 ✨";
            desc.innerText = "太不可思議了！你擁有完美無暇的邏輯直覺，所有的排列限制都難不倒你！你是真正的數學天才！";
        } else if(score >= 3) {
            title.innerText = "🛡️ 邏輯傳奇勇士 🛡️";
            desc.innerText = "非常出色！你在充滿挑戰的陷阱中展現了冷靜的分析力。你是同儕中的邏輯佼佼者！";
        } else {
            title.innerText = "🌱 潛力初級挑戰者 🌱";
            desc.innerText = "很有勇氣！數學冒險本來就充滿挑戰，你已經踏出了成功的第一步。只要再多練習，大師稱號指日可待！";
        }
    }

    function createConfetti() {
        for(let i=0; i<100; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            c.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 4000);
        }
    }

    function showAnalysis() {
        alert("【錯題解析快報】\n1. 全部相異排列 ➔ n!\n2. 頭尾/位置固定 ➔ 不管它，排剩下的位置即可\n3. 分組發生 ➔ 使用乘法原理 (A組!) × (B組!)");
    }

    function go(lv) {
        document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
        document.getElementById('level' + lv).classList.add('active');
        document.getElementById('progress-text').innerText = `LEVEL ${lv} / 5`;
    }
</script>
</body>
</html>
